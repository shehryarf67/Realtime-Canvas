name: CI

# Run all checks for main and pull requests.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Only keep the newest run for each branch or pull request.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  server:
    name: Server — typecheck + tests
    # Mongo memory tests are most reliable on this pinned image.
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Typecheck (tsc build)
        run: npm run build -w server
      - name: Unit + integration tests
        run: npm test -w server

  web:
    name: Web — production build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Next build includes type checking. The API URL is only needed at build time.
      - name: Build (includes typecheck)
        run: npm run build -w web
        env:
          NEXT_PUBLIC_SERVER_URL: http://localhost:4000

  e2e:
    name: E2E — Playwright
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # E2E only targets Chromium, including its required OS packages.
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
        working-directory: web
      # Playwright starts both test servers from its config.
      - name: Run E2E tests
        run: npm run test:e2e -w web
      # Keep the report when E2E fails.
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7
