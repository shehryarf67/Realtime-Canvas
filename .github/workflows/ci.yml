name: CI

# Run the full check suite on every push to main and every PR targeting it.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# A newer push to the same branch cancels an in-progress run for it, so we
# don't waste minutes testing a commit that's already been superseded.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  server:
    name: Server — typecheck + tests
    # Pinned to 22.04: mongodb-memory-server (used by the tests) downloads a
    # mongod binary that is most reliable on this image.
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Typecheck (tsc build)
        run: npm run build -w server
      - name: Unit + integration tests
        run: npm test -w server

  web:
    name: Web — production build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # `next build` runs the TypeScript typecheck as part of the build.
      # A placeholder API URL is inlined at build time; it isn't exercised here.
      - name: Build (includes typecheck)
        run: npm run build -w web
        env:
          NEXT_PUBLIC_SERVER_URL: http://localhost:4000

  e2e:
    name: E2E — Playwright
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Only chromium is needed; --with-deps pulls the required OS libraries.
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
        working-directory: web
      # The Playwright config starts the in-memory-Mongo API and the web dev
      # server itself (reuseExistingServer is off when CI=true, which GitHub
      # sets automatically), so no manual server startup is needed here.
      - name: Run E2E tests
        run: npm run test:e2e -w web
      # Keep the HTML report on failure so a red run is debuggable.
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7
